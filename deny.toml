[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
ignore = [
    # proc-macro-error 1.0.4 unmaintained.
    # Transitive via tray-icon -> muda/libappindicator -> gtk -> glib-macros/gtk3-macros.
    # No safe upgrade upstream. Revisit when tray-icon migrates off gtk3.
    "RUSTSEC-2024-0370",
    # gtk-rs GTK3 bindings unmaintained (atk, gdk, gdk-pixbuf, gdk-sys, gio,
    # gtk, gtk-sys, pango). Transitive via tray-icon -> libappindicator -> gtk.
    # No safe upgrade upstream until tray-icon migrates off gtk3.
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # paste 1.0.x unmaintained. Transitive via slint render stack.
    # No safe upgrade upstream.
    "RUSTSEC-2024-0436",
    # bincode 1.3.3 unmaintained (team disbanded after harassment incident).
    # Transitive via ruflo/agentdb dependencies. v1 is considered feature-complete
    # upstream; migration to alternatives (postcard, rkyv) is non-trivial.
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
# cargo-deny 0.14+ removed `deny`, `copyleft`, `allow-osi-fsf-free`, `default`
# (see EmbarkStudios/cargo-deny#611). Anything not in `allow` is implicitly
# denied — including GPL-2.0 / GPL-3.0 / AGPL-3.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",                # Boost Software License — clipboard-win (transitive via slint)
    "CC0-1.0",                # public-domain dedication used by a few transitives
    "CDLA-Permissive-2.0",    # webpki-roots (transitive via reqwest/hyper-rustls in copypaste-supabase)
]
confidence-threshold = 0.8

# Slint and its sub-crates dual-license under GPL-3.0-only OR royalty-free
# commercial terms. We rely on the royalty-free LicenseRef branch, not GPL.
# `exceptions` whitelists the LicenseRef strings on a per-crate basis.
[[licenses.exceptions]]
name = "slint"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-backend-qt"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-backend-selector"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-backend-winit"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-common"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-compiler"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-core"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-core-macros"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-renderer-femtovg"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "slint-build"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "slint-macros"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
