[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
ignore = []

[licenses]
version = 2
# cargo-deny 0.14+ removed `deny`, `copyleft`, `allow-osi-fsf-free`, `default`
# (see EmbarkStudios/cargo-deny#611). Anything not in `allow` is implicitly
# denied — including GPL-2.0 / GPL-3.0 / AGPL-3.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    "MPL-2.0",
    "BSL-1.0",        # Boost Software License — clipboard-win (transitive via slint)
    "CC0-1.0",        # public-domain dedication used by a few transitives
]
confidence-threshold = 0.8

# Slint and its sub-crates dual-license under GPL-3.0-only OR royalty-free
# commercial terms. We rely on the royalty-free LicenseRef branch, not GPL.
# `exceptions` whitelists the LicenseRef strings on a per-crate basis.
[[licenses.exceptions]]
name = "slint"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-backend-android-activity"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-backend-linuxkms"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-backend-qt"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-backend-selector"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-backend-winit"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-common"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-compiler"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-core"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-core-macros"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-renderer-femtovg"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "i-slint-renderer-skia"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "slint-build"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]
[[licenses.exceptions]]
name = "slint-macros"
allow = ["LicenseRef-Slint-Royalty-free-2.0"]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
