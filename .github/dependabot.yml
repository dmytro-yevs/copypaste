version: 2
updates:
  # Rust workspace — monthly, batched
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    rebase-strategy: "disabled"
    assignees:
      - "dmytro-yevs"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      rust-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      rust-major:
        update-types:
          - "major"

  # GitHub Actions — monthly
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    assignees:
      - "dmytro-yevs"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    pull-request-branch-name:
      separator: "-"

  # Android Gradle deps — monthly
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    assignees:
      - "dmytro-yevs"
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "chore(deps-android)"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
