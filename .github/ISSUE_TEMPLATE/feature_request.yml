name: Feature request
description: Propose new functionality for CopyPaste
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the *problem* first, then the proposal — this makes it much easier to evaluate alternatives.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / problem
      description: What user-visible problem does this solve? Who is affected and how often?
      placeholder: "When I copy on macOS, ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like CopyPaste to behave? Include UX sketches, CLI flags, or API shape if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you rejected them.

  - type: dropdown
    id: components
    attributes:
      label: Affected components
      multiple: true
      options:
        - copypaste-core
        - copypaste-daemon
        - copypaste-cli
        - copypaste-ui (Slint)
        - copypaste-relay
        - Android app
        - Windows port
        - Linux port
        - Docs / CI
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, prior art, ADRs, references.
