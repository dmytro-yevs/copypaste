name: SBOM (CycloneDX)

# Generate CycloneDX SBOMs only after a successful Release workflow run.
# Using workflow_run instead of a direct tag-push trigger ensures the SBOM
# is never published for a failed or incomplete release.
#
# workflow_run fires when the Release workflow completes; the job-level `if`
# guard allows the job only when conclusion == 'success'.
# Manual workflow_dispatch bypasses the gating (no release context needed).

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

concurrency:
  # Use the triggering release's branch/tag for workflow_run;
  # fall back to the current ref for manual dispatch runs.
  group: sbom-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    # workflow_run: only proceed when the Release workflow succeeded.
    # workflow_dispatch: always proceed — manual run, no release gating needed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      # workflow_run: head_branch is the tag name (e.g. v1.2.3) that triggered
      # the Release workflow.  workflow_dispatch: ref_name is the manually
      # selected branch/tag.
      REF_NAME: ${{ github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run: github.sha is the default-branch HEAD, NOT the tag.
          # Check out the exact commit that was released instead.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      # Pin cargo-cyclonedx 0.5.7: 0.4.x used --output-pattern, 0.5.0
       # renamed it to --override-filename. scripts/gen-sbom.sh now uses
       # the new flag. Unpinned install pulled 0.5.7 with --output-pattern
       # removed, breaking v0.2.0-beta.1 SBOM job (2026-05-23).
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx@0.5.7

      - name: Generate SBOMs (JSON)
        run: bash scripts/gen-sbom.sh --format json --output-dir reports/sbom

      - name: Bundle SBOMs into archive
        run: |
          set -euo pipefail
          cd reports
          tar -czf "sbom-${REF_NAME}.tar.gz" sbom/
          ls -lh "sbom-${REF_NAME}.tar.gz"

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.REF_NAME }}
          path: reports/sbom-${{ env.REF_NAME }}.tar.gz
          if-no-files-found: error
          retention-days: 90

      - name: Attach SBOM to GitHub Release
        # Attach only when we were triggered by a tag-push Release run
        # (event == 'push' on the Release workflow means a real tag was pushed).
        # Skip for workflow_dispatch on sbom.yml and for Release workflow_dispatch runs.
        if: >-
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.event == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.REF_NAME }}
          files: reports/sbom-${{ env.REF_NAME }}.tar.gz
          fail_on_unmatched_files: true
