name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) (with rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # Test + clippy on macOS only. Windows/Linux platforms are FROZEN per
  # project mandate — code kept behind cfg gates but not built in CI.
  test:
    name: Test (macos-latest)
    runs-on: macos-latest
    # Headless CI runners have a locked/unavailable login Keychain; the daemon's
    # Security-framework path (e.g. revoke_peer building an IpcServer) panics
    # there. The bypass uses an ephemeral in-memory key for tests — matches
    # coverage.yml / acceptance.yml and the test harness.
    env:
      COPYPASTE_EPHEMERAL_KEY: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) (with clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-latest

      - name: Clippy (macOS — full workspace, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (macOS — full workspace)
        run: cargo test --workspace

  # Dedicated macOS job for the daemon with Keychain integration tests.
  test-macos-daemon:
    name: macOS daemon (Keychain)
    runs-on: macos-latest
    # Real-Keychain integration tests are #[ignore]'d; the runnable daemon tests
    # still hit the Security-framework path, which panics on the headless CI
    # Keychain without the ephemeral-key bypass.
    env:
      COPYPASTE_EPHEMERAL_KEY: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-daemon

      - name: Build daemon
        run: cargo build -p copypaste-daemon

      - name: Test daemon (includes Keychain tests)
        run: cargo test -p copypaste-daemon -- --nocapture

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get week stamp for cache key
        id: date
        run: echo "week=$(date -u +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache advisory-db
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ steps.date.outputs.week }}
          restore-keys: advisory-db-

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        # --no-fetch uses the advisory-db restored by the cache step above
        # (keyed on ISO week); falls back to a full network fetch on a cache
        # miss (first run of the week or a cold runner).
        run: cargo audit --no-fetch || cargo audit

  # cargo-deny: license / source / ban / advisory checks on every PR and push
  # to main. Previously gated to the beta branch in ci-matrix.yml; promoted
  # here so all contributions are checked.
  cargo-deny:
    name: cargo-deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - checks: licenses
            continue-on-error: false
          - checks: sources
            continue-on-error: false
          - checks: bans
            continue-on-error: false
          - checks: advisories
            # advisory hits are informational — do not block merges
            continue-on-error: true
    continue-on-error: ${{ matrix.continue-on-error }}
    steps:
      - uses: actions/checkout@v4

      - name: cargo-deny check ${{ matrix.checks }}
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}

  # MSRV check: compile (no tests needed) against the minimum supported Rust
  # version declared in clippy.toml and Cargo.toml (1.89). Prevents accidental
  # use of post-MSRV stabilised APIs in PRs targeting main.
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.89"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-msrv-

      - name: Install Tauri Linux system deps (glib/gtk/webkit for copypaste-ui)
        # copypaste-ui (Tauri 2) pulls glib-sys/gtk/webkit2gtk-4.1 + soup3 via
        # pkg-config; without these the MSRV check fails with
        # "system library `glib-2.0` ... not found" before it ever type-checks.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev

      - name: cargo check (MSRV)
        # --workspace --all-targets catches all lib/bin/test/bench targets;
        # --locked pins to the committed Cargo.lock so the MSRV is not masked
        # by a transitive dep bump.
        run: cargo check --workspace --all-targets --locked

  # UI vitest suite: runs the React/TypeScript unit tests for copypaste-ui.
  # Kept as a dedicated job so it is clearly labelled in the PR status checks
  # and can be required independently of the Rust jobs.
  ui-test:
    name: UI vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: crates/copypaste-ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: crates/copypaste-ui
        run: pnpm install --frozen-lockfile

      - name: Run vitest
        working-directory: crates/copypaste-ui
        run: pnpm test
