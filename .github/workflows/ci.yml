name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) (with rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # Test + clippy on macOS only. Windows/Linux platforms are FROZEN per
  # project mandate — code kept behind cfg gates but not built in CI.
  test:
    name: Test (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) (with clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-latest

      - name: Build (macOS — full workspace)
        run: cargo build --workspace

      - name: Test (macOS — full workspace)
        run: cargo test --workspace

      - name: Clippy (macOS — full workspace)
        run: cargo clippy --workspace -- -D warnings

  # Dedicated macOS job for the daemon with Keychain integration tests.
  test-macos-daemon:
    name: macOS daemon (Keychain)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-daemon

      - name: Build daemon
        run: cargo build -p copypaste-daemon

      - name: Test daemon (includes Keychain tests)
        run: cargo test -p copypaste-daemon -- --nocapture

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        # Option B: try --no-fetch first (uses runner's cached advisory-db if present),
        # fall back to full network fetch. Trade-off: no explicit cache key means
        # cold runners always fetch; Option A (actions/cache keyed by date) would
        # save ~5s/run but adds cache-miss complexity. Revisit if advisory-db fetch
        # becomes a bottleneck.
        run: cargo audit --no-fetch || cargo audit
