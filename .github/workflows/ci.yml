name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) (with rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # Test + clippy on macOS only. Windows/Linux platforms are FROZEN per
  # project mandate — code kept behind cfg gates but not built in CI.
  #
  # CopyPaste-d41w.21: pinned to macos-14 to MATCH release.yml's build-macos
  # runner, so CI tests run on the same OS image the shipping artifact is built
  # on. Previously CI floated on macos-latest while release pinned macos-14 — a
  # silent drift where tests could pass on a newer macOS than release builds.
  # Bump both together when moving the pin.
  test:
    name: Test (macos-14)
    runs-on: macos-14
    # Headless CI runners have a locked/unavailable login Keychain; the daemon's
    # Security-framework path (e.g. revoke_peer building an IpcServer) panics
    # there. The bypass uses an ephemeral in-memory key for tests — matches
    # coverage.yml / acceptance.yml and the test harness.
    env:
      COPYPASTE_EPHEMERAL_KEY: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) (with clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-latest

      - name: Clippy (macOS — full workspace, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (macOS — full workspace)
        run: cargo test --workspace

  # Dedicated macOS job for the daemon with Keychain integration tests.
  test-macos-daemon:
    name: macOS daemon (Keychain)
    runs-on: macos-14
    # Real-Keychain integration tests are #[ignore]'d; the runnable daemon tests
    # still hit the Security-framework path, which panics on the headless CI
    # Keychain without the ephemeral-key bypass.
    env:
      COPYPASTE_EPHEMERAL_KEY: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-daemon

      - name: Build daemon
        run: cargo build -p copypaste-daemon

      - name: Test daemon (includes Keychain tests)
        # CopyPaste-tohs: isolate the data/cache/config/log dirs to a writable
        # temp location ($RUNNER_TEMP — runner ctx is only valid in step scope,
        # not job-level env). --test-threads=1: many daemon tests mutate
        # process-global env (COPYPASTE_*/HOME via EnvGuard) and share the data
        # dir + peers file; serial execution makes them deterministic.
        env:
          COPYPASTE_DATA_DIR: ${{ runner.temp }}/cp/data
          COPYPASTE_CACHE_DIR: ${{ runner.temp }}/cp/cache
          COPYPASTE_CONFIG_DIR: ${{ runner.temp }}/cp/config
          COPYPASTE_LOG_DIR: ${{ runner.temp }}/cp/log
        run: |
          mkdir -p "$COPYPASTE_DATA_DIR" "$COPYPASTE_CACHE_DIR" "$COPYPASTE_CONFIG_DIR" "$COPYPASTE_LOG_DIR"
          cargo test -p copypaste-daemon -- --test-threads=1 --nocapture

      - name: Test daemon with cloud-sync feature (44rq.14)
        # cloud-sync is now a default feature (Cargo.toml default = ["cloud-sync", "relay-sync"]),
        # but this explicit step ensures the cloud IPC paths (cloud_sign_in, get_sync_status, etc.)
        # compile and their mockito-backed unit tests run.  Uses --features to be unambiguous even
        # if defaults change.  --test-threads=1 for the same env-mutation reason as above.
        env:
          COPYPASTE_DATA_DIR: ${{ runner.temp }}/cp-cloud/data
          COPYPASTE_CACHE_DIR: ${{ runner.temp }}/cp-cloud/cache
          COPYPASTE_CONFIG_DIR: ${{ runner.temp }}/cp-cloud/config
          COPYPASTE_LOG_DIR: ${{ runner.temp }}/cp-cloud/log
        run: |
          mkdir -p "$COPYPASTE_DATA_DIR" "$COPYPASTE_CACHE_DIR" "$COPYPASTE_CONFIG_DIR" "$COPYPASTE_LOG_DIR"
          cargo test -p copypaste-daemon --features cloud-sync -- --test-threads=1

  # Feature-combination coverage (audit zbkm): the default `test` job only
  # exercises default features. This job catches cfg/feature-gated breakage.
  # --no-default-features is fully tested; --all-features runs clippy (-D warnings)
  # so dead_code and other lint warnings in feature-gated paths are caught (CopyPaste-55cw).
  # cargo test --all-features is deferred: cloud-sync/Supabase paths need network
  # or credentials at runtime that headless CI lacks. Upgrade to `cargo test` when
  # those paths gain offline test doubles.
  feature-matrix:
    name: Features (${{ matrix.variant }})
    runs-on: macos-14
    env:
      COPYPASTE_EPHEMERAL_KEY: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: no-default-features
            cmd: cargo test --workspace --no-default-features
          - variant: all-features
            cmd: cargo clippy --workspace --all-features -- -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) (with clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: feature-${{ matrix.variant }}

      - name: ${{ matrix.variant }}
        run: ${{ matrix.cmd }}

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get week stamp for cache key
        id: date
        run: echo "week=$(date -u +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache advisory-db
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ steps.date.outputs.week }}
          restore-keys: advisory-db-

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        # Plain `cargo audit` fetches/updates the advisory-db into the cached
        # ~/.cargo/advisory-db (cloning it on a cold cache). The previous
        # --no-fetch dance failed on an empty cache ("advisory-db/crates: No
        # such file or directory") because nothing populated the DB first.
        run: cargo audit

  # cargo-deny: license / source / ban / advisory checks on every PR and push
  # to main. Previously gated to the beta branch in ci-matrix.yml; promoted
  # here so all contributions are checked.
  cargo-deny:
    name: cargo-deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - checks: licenses
            continue-on-error: false
          - checks: sources
            continue-on-error: false
          - checks: bans
            continue-on-error: false
          - checks: advisories
            # d41w.14: advisory hits are now blocking — a new CVE must not silently
            # pass CI. Known-safe advisories should be added to deny.toml [advisories]
            # ignore list with a justification comment rather than suppressed globally.
            continue-on-error: false
    continue-on-error: ${{ matrix.continue-on-error }}
    steps:
      - uses: actions/checkout@v4

      - name: cargo-deny check ${{ matrix.checks }}
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}

  # MSRV check: compile (no tests needed) against the minimum supported Rust
  # version declared in clippy.toml and Cargo.toml (1.96). Prevents accidental
  # use of post-MSRV stabilised APIs in PRs targeting main.
  msrv:
    name: MSRV (1.96)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-msrv-

      - name: Install Tauri Linux system deps (glib/gtk/webkit for copypaste-ui)
        # copypaste-ui (Tauri 2) pulls glib-sys/gtk/webkit2gtk-4.1 + soup3 via
        # pkg-config; without these the MSRV check fails with
        # "system library `glib-2.0` ... not found" before it ever type-checks.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev

      - name: cargo check (MSRV)
        # --workspace --all-targets catches all lib/bin/test/bench targets;
        # --locked pins to the committed Cargo.lock so the MSRV is not masked
        # by a transitive dep bump.
        run: cargo check --workspace --all-targets --locked

  # UI vitest suite: runs the React/TypeScript unit tests for copypaste-ui.
  # Kept as a dedicated job so it is clearly labelled in the PR status checks
  # and can be required independently of the Rust jobs.
  ui-test:
    name: UI vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: crates/copypaste-ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: crates/copypaste-ui
        run: pnpm install --frozen-lockfile

      - name: Run vitest
        working-directory: crates/copypaste-ui
        run: pnpm test

      # PG/audit 9oyh: production build (tsc typecheck + vite bundle) on every PR,
      # not just at release — catches type errors and build regressions early.
      - name: Build (tsc + vite)
        working-directory: crates/copypaste-ui
        run: pnpm build

  # ESLint for the React/TypeScript frontend (CopyPaste-q3pe).
  # Separate job so ESLint failures are clearly labelled in PR status checks,
  # independent of vitest and the tsc/vite build. Warnings are informational
  # (no --max-warnings flag); only rule violations at error-level block the PR.
  ui-lint:
    name: UI ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: crates/copypaste-ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: crates/copypaste-ui
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: crates/copypaste-ui
        run: pnpm lint

  # cargo test --workspace --all-features (CopyPaste-h3j2).
  # The default `test` job runs default features only; the feature-matrix job
  # runs --all-features under clippy but skips cargo test because the
  # cloud-sync/Supabase network paths were thought to need credentials.
  # Closer analysis: the cloud-sync integration tests are behind
  # `#[cfg(all(test, feature = "cloud-sync"))]` guards and use mockito HTTP
  # stubs — no live network or credentials required. This job adds the missing
  # `cargo test --all-features` gate so feature-gated test paths are exercised
  # on every PR, not just at release.
  # Runs on ubuntu-latest (faster, cheaper) with the same Tauri deps that the
  # msrv and ci-matrix jobs already install for Linux builds.
  test-all-features:
    name: Test (all-features)
    runs-on: ubuntu-latest
    env:
      COPYPASTE_EPHEMERAL_KEY: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Tauri Linux system deps (glib/gtk/webkit for copypaste-ui)
        # copypaste-ui (Tauri 2) pulls glib-sys/gtk/webkit2gtk-4.1 + soup3 via
        # pkg-config on Linux; without these the build fails with
        # "system library `glib-2.0` ... not found". Copied from ci-matrix.yml
        # and msrv job — same dep set, same reason.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-all-features

      - name: cargo test --workspace --all-features
        run: cargo test --workspace --all-features

  # token-parity-contrast (scripts/parity-check.mjs + .github/workflows/parity.yml)
  # retired by android-material3-redesign task 2.11a: the script hardcoded the
  # pre-redesign CpColors field set and cannot map the ~35 additive non-color
  # tokens the desktop redesign introduced. Replaced by parity/tokens.json +
  # TokenParityTest (android/app/src/test/java/com/copypaste/android/parity/
  # TokenParityTest.kt), generated via scripts/gen-parity-tokens.mjs and run as
  # part of `:app:testDebugUnitTestPreExisting` (invoked here via the aggregate
  # `:app:test` task, see ci-android-build.yml) — see cross-platform-parity.md.
