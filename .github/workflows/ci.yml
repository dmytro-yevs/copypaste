name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85 (with rustfmt)
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # Test + clippy on macOS. Windows removed 2026-05-23 (ADR-012).
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85 (with clippy)
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Build (macOS — full workspace)
        run: cargo build --workspace

      - name: Test (macOS — full workspace)
        run: cargo test --workspace

      - name: Clippy (macOS — full workspace)
        run: cargo clippy --workspace -- -D warnings

  # Windows cargo-check job removed 2026-05-23: Windows frozen for v0.3+
  # (see ADR-012). Re-add a `check-windows` job here when Windows is thawed.

  # Dedicated macOS job for the daemon with Keychain integration tests.
  test-macos-daemon:
    name: macOS daemon (Keychain)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-daemon

      - name: Build daemon
        run: cargo build -p copypaste-daemon

      - name: Test daemon (includes Keychain tests)
        run: cargo test -p copypaste-daemon -- --nocapture

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit
