name: Coverage

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  COVERAGE_AUTO_INSTALL: "1"

jobs:
  coverage:
    name: Workspace coverage (macOS)
    # macOS — full workspace builds, including copypaste-daemon (macOS-only deps).
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # Toolchain bumped 1.85 -> 1.86 (2026-05-23): transitive deps
      # icu_collections / icu_locale_core / icu_normalizer @2.2.0 (pulled in
      # via idna 1.1.0 -> url 2.5.8 -> reqwest / sentry / slint-compiler) now
      # require rustc 1.86. cargo-llvm-cov uses cargo test, which honours
      # package.rust-version and fails on 1.85 with "is not supported by".
      - name: Install Rust 1.86 (with llvm-tools-preview)
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage-macos

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run coverage (HTML + LCOV)
        run: bash scripts/coverage.sh

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/html/
          retention-days: 14
          if-no-files-found: warn
