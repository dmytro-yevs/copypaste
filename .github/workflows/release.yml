# Release pipeline — beta-w1.3
#
# Triggered on tag push matching v*.*.* (or workflow_dispatch).
# Builds macOS arm64 DMG via W1.4 release scripts (build-dmg-ci.sh, verify-checksum.sh).
# Uses ad-hoc codesigning (no Developer ID) — see ADR for beta distribution policy.
#
# Required GitHub repository secrets:
#   (none) — ad-hoc signing requires no certificates or secrets.
#
# Optional secrets (NOT consumed in this workflow — for future post-tag jobs):
#   HOMEBREW_TAP_TOKEN — PAT for pushing formula to separate homebrew-tap repo.
#
# Pinned action versions (no @master or @v0 refs):
#   actions/checkout@v4
#   actions/upload-artifact@v4
#   dtolnay/rust-toolchain@stable
#   Swatinem/rust-cache@v2
#   softprops/action-gh-release@v2

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0-beta.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-arm64

      - name: Build release (workspace, all features)
        run: cargo build --release --workspace --all-features

      - name: Resolve release version
        id: ver
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build DMG (W1.4 script)
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if [ -f scripts/release/build-dmg-ci.sh ]; then
            bash scripts/release/build-dmg-ci.sh "$RELEASE_VERSION"
          else
            echo "::error::scripts/release/build-dmg-ci.sh missing — W1.4 not delivered yet"
            exit 1
          fi

      - name: Strip quarantine xattr (postbuild)
        # Ad-hoc signed artifacts inherit com.apple.quarantine from the
        # runner's download/extract steps. Strip recursively from the DMG
        # and any staged .app so Gatekeeper does not warn on first launch
        # after Homebrew Cask install. See ADR-010.
        # All release artefacts live in dist/ (see ADR-012, db8578a).
        run: |
          if compgen -G "dist/*.dmg" > /dev/null; then
            xattr -cr dist/*.dmg || true
          fi
          if [ -d dist/CopyPaste.app ]; then
            xattr -cr dist/CopyPaste.app || true
          fi

      - name: Verify checksum (W1.4 script)
        # build-dmg-ci.sh emits each artefact's .sha256 alongside it in dist/.
        # verify-checksum.sh then aggregates all dist/*.dmg into dist/SHA256SUMS.
        run: |
          if [ -f scripts/release/verify-checksum.sh ]; then
            bash scripts/release/verify-checksum.sh dist
          else
            echo "::error::scripts/release/verify-checksum.sh missing — W1.4 not delivered yet"
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CopyPaste-${{ steps.ver.outputs.version }}-macos-arm64
          path: |
            dist/*.dmg
            dist/*.dmg.sha256
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            dist/*.dmg
            dist/*.dmg.sha256
            dist/SHA256SUMS
          generate_release_notes: true
          prerelease: ${{ contains(steps.ver.outputs.version, '-alpha') || contains(steps.ver.outputs.version, '-beta') || contains(steps.ver.outputs.version, '-rc') }}
