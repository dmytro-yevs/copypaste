name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0-alpha.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-aarch64

      - name: Build release (macOS crates only)
        run: |
          cargo build --release \
            -p copypaste-core \
            -p copypaste-daemon \
            -p copypaste-cli

      - name: Create .app bundle
        run: bash scripts/make_app_bundle.sh

      - name: Create DMG
        env:
          RELEASE_VERSION: ${{ github.ref_name || inputs.version }}
        run: bash scripts/make_dmg.sh "$RELEASE_VERSION"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows (stub)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-windows-x86_64

      - name: Build release (Windows crates only)
        run: |
          cargo build --release `
            -p copypaste-daemon `
            -p copypaste-cli

      - name: Package Windows binaries
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ github.ref_name || inputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\release\copypaste-daemon.exe" dist\
          Copy-Item "target\release\copypaste.exe" dist\
          $version = $env:RELEASE_VERSION
          Compress-Archive -Path dist\*.exe -DestinationPath "dist\copypaste-windows-x86_64-$version.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/

      - name: Download Windows ZIP (optional)
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: dist/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          files: |
            dist/*.dmg
            dist/*.zip
          draft: true
          generate_release_notes: true
