# Release pipeline — beta-w1.3
# Updated: PR2a Android parallel build, PR2b release integration, PR8 explicit features
#          PR9 Android APK: adds Gradle assembleDebug after cargo-ndk .so build
#
# Triggered on tag push matching v*.*.* (or workflow_dispatch).
# Builds macOS arm64 DMG via W1.4 release scripts (build-dmg-ci.sh, verify-checksum.sh).
# Builds Android arm64-v8a .so via cargo-ndk then produces debug APK via Gradle.
# Uses ad-hoc codesigning (no Developer ID) — see ADR for beta distribution policy.
#
# Required GitHub repository secrets:
#   (none) — ad-hoc signing requires no certificates or secrets.
#
# Optional secrets (NOT consumed in this workflow — for future post-tag jobs):
#   HOMEBREW_TAP_TOKEN — PAT for pushing formula to separate homebrew-tap repo.
#
# Pinned action versions (no @master or @v0 refs):
#   actions/checkout@v4
#   actions/upload-artifact@v4
#   dtolnay/rust-toolchain@stable
#   Swatinem/rust-cache@v2
#   softprops/action-gh-release@v2

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0-beta.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-arm64

      - name: Build release (workspace, explicit features)
        run: |
          # cloud-sync excluded from release build — requires Supabase credentials not present in CI
          cargo build --release --workspace \
            --features copypaste-android/android-uniffi-live

      - name: Resolve release version
        id: ver
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build DMG (W1.4 script)
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if [ -f scripts/release/build-dmg-ci.sh ]; then
            bash scripts/release/build-dmg-ci.sh "$RELEASE_VERSION"
          else
            echo "::error::scripts/release/build-dmg-ci.sh missing — W1.4 not delivered yet"
            exit 1
          fi

      - name: Strip quarantine xattr (postbuild)
        # make_dmg.sh now strips quarantine from the .app inside the DMG staging
        # directory before packaging so files baked into the UDZO image carry no
        # com.apple.quarantine xattr. Without that, Finder propagates the xattr
        # to the /Applications copy on drag-install and Gatekeeper blocks the
        # ad-hoc-signed binaries on first launch. This step is belt-and-suspenders:
        # catches any quarantine on the outer DMG container (from the runner's
        # checkout/download steps) and on any staged .app left in dist/ for
        # Homebrew Cask. See ADR-010. All artefacts live in dist/ (ADR-012).
        run: |
          if compgen -G "dist/*.dmg" > /dev/null; then
            xattr -cr dist/*.dmg || true
          fi
          if [ -d dist/CopyPaste.app ]; then
            xattr -cr dist/CopyPaste.app || true
          fi

      - name: Verify checksum (W1.4 script)
        # build-dmg-ci.sh emits each artefact's .sha256 alongside it in dist/.
        # verify-checksum.sh then aggregates all dist/*.dmg into dist/SHA256SUMS.
        run: |
          if [ -f scripts/release/verify-checksum.sh ]; then
            bash scripts/release/verify-checksum.sh dist
          else
            echo "::error::scripts/release/verify-checksum.sh missing — W1.4 not delivered yet"
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CopyPaste-${{ steps.ver.outputs.version }}-macos-arm64
          path: |
            dist/*.dmg
            dist/*.dmg.sha256
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  # PR2a — Android arm64-v8a build (runs in parallel with build-macos, no dependency)
  build-android:
    name: Build Android (arm64-v8a)
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) with Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-android-arm64

      - name: Install Android NDK and cargo-ndk
        run: |
          # Install cargo-ndk (cross-compilation driver for Android targets)
          cargo install cargo-ndk --locked
          # Install NDK via sdkmanager bundled with the ubuntu-latest runner
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" 2>/dev/null \
            || echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk-bundle" 2>/dev/null \
            || true
          # Prefer the env var set by the runner; fall back to the installed bundle
          NDK_DIR="${ANDROID_NDK_HOME:-${ANDROID_HOME}/ndk-bundle}"
          echo "ANDROID_NDK_HOME=${NDK_DIR}" >> "$GITHUB_ENV"

      - name: Resolve release version
        id: ver
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android .so (arm64-v8a, explicit features)
        run: |
          # cloud-sync excluded from release build — requires Supabase credentials not present in CI
          cargo ndk -t arm64-v8a \
            build -p copypaste-android --release \
            --features copypaste-android/android-uniffi-live

      - name: Collect .so artifact
        run: |
          mkdir -p dist-android
          find target/aarch64-linux-android/release -maxdepth 1 -name "*.so" \
            -exec cp {} dist-android/ \;
          ls -lh dist-android/

      - name: Copy .so into jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libcopypaste_android.so \
             android/app/src/main/jniLibs/arm64-v8a/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        working-directory: android
        # Skip buildCargoNdk — .so already placed in jniLibs above
        run: ./gradlew assembleDebug --no-daemon -x buildCargoNdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ steps.ver.outputs.version }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CopyPaste-${{ steps.ver.outputs.version }}-android-arm64
          path: dist-android/*.so
          if-no-files-found: error
          retention-days: 14

  # PR2b — Publish release only after both platform builds succeed
  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-android]
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Resolve release version
        id: ver
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: CopyPaste-${{ steps.ver.outputs.version }}-macos-arm64
          path: dist/macos

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: CopyPaste-${{ steps.ver.outputs.version }}-android-arm64
          path: dist/android

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk-${{ steps.ver.outputs.version }}
          path: dist/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            dist/macos/*.dmg
            dist/macos/*.dmg.sha256
            dist/macos/SHA256SUMS
            dist/android/*.so
            dist/android/*.apk
          generate_release_notes: true
          prerelease: ${{ contains(steps.ver.outputs.version, '-alpha') || contains(steps.ver.outputs.version, '-beta') || contains(steps.ver.outputs.version, '-rc') }}

      - name: Checkout repo (for cask update)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Update Homebrew Cask
        # Runs after the release assets are published so the DMG URL resolves.
        # gen-cask.sh auto-fetches the tag, downloads the DMG, computes sha256,
        # updates Casks/copypaste.rb, then commits + pushes (GITHUB_ACTIONS=true).
        run: bash scripts/release/gen-cask.sh
