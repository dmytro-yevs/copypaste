# Release pipeline — beta-w1.3
# Updated: PR2a Android parallel build, PR2b release integration, PR8 explicit features
#          PR9 Android APK: adds Gradle assembleDebug after cargo-ndk .so build
#
# Triggered on tag push matching v*.*.* (or workflow_dispatch).
# Builds macOS arm64 DMG via W1.4 release scripts (build-dmg-ci.sh, verify-checksum.sh).
# Builds Android arm64-v8a .so via cargo-ndk then produces debug APK via Gradle.
# Uses ad-hoc codesigning (no Developer ID) — see ADR for beta distribution policy.
#
# Required GitHub repository secrets:
#   (none) — ad-hoc signing requires no certificates or secrets.
#
# Pinned action versions (no @master or @v0 refs):
#   actions/checkout@v4
#   actions/upload-artifact@v4
#   dtolnay/rust-toolchain@stable
#   Swatinem/rust-cache@v2
#   softprops/action-gh-release@v2

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0-beta.0)'
        required: true
        type: string

# Cancel any in-flight release run for the same ref. Tag re-pushes
# (force-update of v0.3.1 etc) supersede the previous attempt rather
# than racing it. Asset uploads (softprops) are not transactional —
# concurrent runs to the same release cause partial/duplicate uploads.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-arm64

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Build release binaries (CLI, daemon, relay)
        run: |
          # cloud-sync enabled: the released daemon ships with Supabase sync support.
          # Credentials (SUPABASE_URL / SUPABASE_ANON_KEY) are read at runtime from
          # the app bundle's config, not at compile time — no CI secrets required.
          # copypaste-android excluded on macOS — needs aarch64-linux-android target (built in build-android job)
          # Build the non-UI crates the DMG ships (copypaste CLI, daemon, relay).
          # The relay binary is bundled into CopyPaste.app (REQUIRED_BINS),
          # so it must be present in target/release/ before build-dmg-ci.sh runs.
          cargo build --release \
            -p copypaste-cli \
            -p copypaste-daemon --features copypaste-daemon/cloud-sync \
            -p copypaste-relay

      - name: Sync tauri.conf.json version to release version
        # Must run BEFORE `pnpm tauri build` — Tauri reads tauri.conf.json's
        # top-level "version" into the .app Info.plist (CFBundleShortVersionString /
        # CFBundleVersion). Bumping it after the build (e.g. in gen-cask.sh, which
        # runs post-publish) would leave the SHIPPED DMG carrying a stale version
        # and break Homebrew `--adopt` version comparison. Strip a leading 'v' from
        # the tag so the plist version is bare (e.g. v0.5.0 → 0.5.0).
        run: |
          RAW_VERSION="${INPUT_VERSION:-$TAG_NAME}"
          BARE_VERSION="${RAW_VERSION#v}"
          TAURI_CONF="crates/copypaste-ui/src-tauri/tauri.conf.json"
          echo "==> Setting $TAURI_CONF version → $BARE_VERSION"
          TMP="$(mktemp)"
          # Exactly one top-level "version" key in this file; replace it in place.
          sed 's/"version": "[^"]*"/"version": "'"$BARE_VERSION"'"/' "$TAURI_CONF" > "$TMP"
          if grep -qF "\"version\": \"${BARE_VERSION}\"" "$TMP"; then
            mv "$TMP" "$TAURI_CONF"
          else
            echo "::error::failed to set version in $TAURI_CONF"
            rm -f "$TMP"
            exit 1
          fi
          grep '"version"' "$TAURI_CONF"

      - name: Build Tauri app (pnpm install + pnpm tauri build)
        working-directory: crates/copypaste-ui
        run: |
          pnpm install --frozen-lockfile
          pnpm tauri build

      - name: Resolve release version
        id: ver
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build DMG (W1.4 script)
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if [ -f scripts/release/build-dmg-ci.sh ]; then
            bash scripts/release/build-dmg-ci.sh "$RELEASE_VERSION"
          else
            echo "::error::scripts/release/build-dmg-ci.sh missing — W1.4 not delivered yet"
            exit 1
          fi

      - name: Strip quarantine xattr (postbuild)
        # make_dmg.sh now strips quarantine from the .app inside the DMG staging
        # directory before packaging so files baked into the UDZO image carry no
        # com.apple.quarantine xattr. Without that, Finder propagates the xattr
        # to the /Applications copy on drag-install and Gatekeeper blocks the
        # ad-hoc-signed binaries on first launch. This step is belt-and-suspenders:
        # catches any quarantine on the outer DMG container (from the runner's
        # checkout/download steps) and on any staged .app left in dist/ for
        # Homebrew Cask. See ADR-010. All artefacts live in dist/ (ADR-012).
        run: |
          if compgen -G "dist/*.dmg" > /dev/null; then
            xattr -cr dist/*.dmg || true
          fi
          if [ -d dist/CopyPaste.app ]; then
            xattr -cr dist/CopyPaste.app || true
          fi

      - name: Verify checksum (W1.4 script)
        # build-dmg-ci.sh emits each artefact's .sha256 alongside it in dist/.
        # verify-checksum.sh then aggregates all dist/*.dmg into dist/SHA256SUMS.
        run: |
          if [ -f scripts/release/verify-checksum.sh ]; then
            bash scripts/release/verify-checksum.sh dist
          else
            echo "::error::scripts/release/verify-checksum.sh missing — W1.4 not delivered yet"
            exit 1
          fi

      - name: Attest DMG build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CopyPaste-${{ steps.ver.outputs.version }}-macos-arm64
          path: |
            dist/*.dmg
            dist/*.dmg.sha256
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  # PR2a — Android arm64-v8a build (runs in parallel with build-macos, no dependency)
  # TEMPORARILY NON-BLOCKING (v0.5.0): the Android build is known-broken and the
  # macOS DMG must ship now. continue-on-error keeps the .so/APK logs flowing for
  # the later Android fix without failing the overall Release run or gating macOS.
  build-android:
    name: Build Android (arm64-v8a)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) with Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-android-arm64

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
            ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
          key: android-ndk-27.2.12479018-${{ runner.os }}
          restore-keys: android-ndk-27.2.12479018-

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Install Android NDK
        run: |
          # Install NDK via sdkmanager bundled with the ubuntu-latest runner
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" 2>/dev/null \
            || echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk-bundle" 2>/dev/null \
            || true
          # Prefer the env var set by the runner; fall back to the installed bundle
          NDK_DIR="${ANDROID_NDK_HOME:-${ANDROID_HOME}/ndk-bundle}"
          echo "ANDROID_NDK_HOME=${NDK_DIR}" >> "$GITHUB_ENV"

      - name: Resolve release version
        id: ver
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android .so (arm64-v8a, explicit features)
        run: |
          # cloud-sync excluded from release build — requires Supabase credentials not present in CI
          cargo ndk -t arm64-v8a \
            build -p copypaste-android --release \
            --features copypaste-android/android-uniffi-live

      - name: Collect .so artifact
        run: |
          mkdir -p dist-android
          find target/aarch64-linux-android/release -maxdepth 1 -name "*.so" \
            -exec cp {} dist-android/ \;
          ls -lh dist-android/

      - name: Copy .so into jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libcopypaste_android.so \
             android/app/src/main/jniLibs/arm64-v8a/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle caches + build cache + configuration cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
            ~/.gradle/configuration-cache
            android/.gradle/configuration-cache
            android/build/intermediates
            android/app/build/intermediates
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml', 'android/app/src/main/java/com/copypaste/generated/**') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Note: no "Pre-generate debug keystore" step needed — android/app/debug.keystore
      # is committed to the repo and referenced by signingConfigs.debug in build.gradle.kts.
      # Generating a fresh keystore each run was the root cause of INSTALL_FAILED_UPDATE_INCOMPATIBLE.

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug -x buildCargoNdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ steps.ver.outputs.version }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CopyPaste-${{ steps.ver.outputs.version }}-android-arm64
          path: dist-android/*.so
          if-no-files-found: error
          retention-days: 14

  # Per-platform publish: each platform independent so one failure
  # does not block the other from shipping. softprops/action-gh-release
  # is idempotent — both jobs append to the same release.
  publish-macos:
    name: Publish macOS Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos]
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Resolve release version
        id: ver
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: CopyPaste-${{ steps.ver.outputs.version }}-macos-arm64
          path: dist/macos

      - name: Publish macOS assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            dist/macos/*.dmg
            dist/macos/*.dmg.sha256
            dist/macos/SHA256SUMS
          generate_release_notes: true
          prerelease: ${{ contains(steps.ver.outputs.version, '-alpha') || contains(steps.ver.outputs.version, '-beta') || contains(steps.ver.outputs.version, '-rc') }}
          fail_on_unmatched_files: true

      - name: Checkout repo (for cask update)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Update Homebrew Cask
        # Runs after the macOS DMG is published so the URL resolves.
        # gen-cask.sh auto-fetches the tag, downloads the DMG, computes sha256,
        # updates Casks/copypaste.rb, then commits + pushes (GITHUB_ACTIONS=true).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/release/gen-cask.sh

      - name: Trigger tap repo sync
        # Notify dmytro-yevs/homebrew-copypaste to pull the latest cask
        # immediately instead of waiting for the hourly cron.
        # TAP_DISPATCH_TOKEN is a PAT with `repo` scope on homebrew-copypaste
        # (GITHUB_TOKEN cannot dispatch to a different repo).
        if: env.TAP_DISPATCH_TOKEN != ''
        env:
          TAP_DISPATCH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Strip leading 'v' from tag for the tap's expected version format.
          BARE_VERSION="${VERSION#v}"
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${TAP_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/dmytro-yevs/homebrew-copypaste/dispatches \
            -d "{\"event_type\":\"release-published\",\"client_payload\":{\"version\":\"${BARE_VERSION}\"}}"
          echo "Tap dispatch sent for version ${BARE_VERSION}"

  # TEMPORARILY NON-BLOCKING (v0.5.0): Android APK is deferred to a later release.
  # continue-on-error + fail_on_unmatched_files:false mean a missing/failed Android
  # artifact never fails the Release run or blocks the macOS DMG publish above.
  publish-android:
    name: Publish Android Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-android]
    continue-on-error: true
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Resolve release version
        id: ver
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Android .so artifact
        uses: actions/download-artifact@v4
        # Android build may be skipped/failed (non-blocking) — don't fail if the
        # artifact is absent. The publish step uploads only what exists.
        continue-on-error: true
        with:
          name: CopyPaste-${{ steps.ver.outputs.version }}-android-arm64
          path: dist/android

      - name: Download Android APK
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: android-debug-apk-${{ steps.ver.outputs.version }}
          path: dist/android

      - name: Publish Android assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            dist/android/*.so
            dist/android/*.apk
          generate_release_notes: true
          prerelease: ${{ contains(steps.ver.outputs.version, '-alpha') || contains(steps.ver.outputs.version, '-beta') || contains(steps.ver.outputs.version, '-rc') }}
          # APK deferred to a later release — a missing .so/.apk must not fail the run.
          fail_on_unmatched_files: false
