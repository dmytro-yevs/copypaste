name: CI Matrix (beta-bonus)

on:
  # Multi-toolchain matrix (stable + beta) and doc-build run on main and all
  # release/** branches. The normal ci.yml job (single stable toolchain) already
  # covers pull_request into main; this matrix adds beta-toolchain and release-branch
  # coverage on top without duplicating the main PR check.
  pull_request:
    branches: [main, "release/**"]
  push:
    branches: [main, "release/**"]
  workflow_dispatch:

concurrency:
  group: ci-matrix-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-matrix:
    name: test (${{ matrix.toolchain }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Install Tauri Linux system deps (glib/gtk/webkit for copypaste-ui)
        # copypaste-ui (Tauri 2) pulls glib-sys/gtk/webkit2gtk-4.1 + soup3 via
        # pkg-config; without these the Linux build dies with
        # "system library `glib-2.0` ... not found" before it type-checks.
        # macOS uses the native WebKit, so this is Linux-only.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.toolchain }}-

      - name: cargo test --workspace
        run: cargo test --workspace --locked

  clippy-strict:
    name: clippy (strict, -D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Tauri Linux system deps (glib/gtk/webkit for copypaste-ui)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-deny:
    name: cargo-deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - checks: licenses
            continue-on-error: false
          - checks: sources
            continue-on-error: false
          - checks: bans
            continue-on-error: false
          - checks: advisories
            # d41w.14: blocking — see ci.yml cargo-deny job for rationale.
            continue-on-error: false
    continue-on-error: ${{ matrix.continue-on-error }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}

  doc-build:
    name: doc-build
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux system deps (glib/gtk/webkit for copypaste-ui)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: cargo doc
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Upload doc artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdoc
          path: target/doc
          retention-days: 7

  unused-deps:
    name: unused-deps (cargo-machete)
    runs-on: ubuntu-latest
    # Blocking (CopyPaste-yorm): genuinely unused deps have been removed and
    # false positives suppressed via [package.metadata.cargo-machete] ignore
    # lists. `continue-on-error: true` masked all machete hits previously.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete

      - name: cargo machete
        # Run without --with-metadata to avoid false positives from build-script
        # deps (tauri-build), platform-conditional deps (rusqlite on Android),
        # and dev-dep-only crates (tracing-appender, tokio-test, hyper in relay).
        # The basic scan reliably catches genuinely unused production deps.
        run: cargo machete
