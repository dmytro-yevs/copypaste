name: Security Audit (scheduled)

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Get week stamp for cache key
        id: date
        run: echo "week=$(date -u +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache advisory-db
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ steps.date.outputs.week }}
          restore-keys: advisory-db-

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        # --no-fetch uses the cached advisory-db; falls back to full network
        # fetch on a cache miss (first run of the week or cold runner).
        # AUDIT: `cargo audit --no-fetch || cargo audit` retries without --no-fetch
        # on failure, but this also masks a genuine advisory hit on the first run
        # (if --no-fetch fails for any reason, the retry may succeed and hide the
        # vulnerability finding). Consider: `cargo audit --no-fetch || { cargo audit --db-update; cargo audit --no-fetch; }`
        # to separate cache-miss recovery from advisory failures. Human decision required.
        run: cargo audit --no-fetch || cargo audit
