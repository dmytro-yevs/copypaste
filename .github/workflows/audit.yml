name: Security Audit (scheduled)

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Get week stamp for cache key
        id: date
        run: echo "week=$(date -u +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache advisory-db
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ steps.date.outputs.week }}
          restore-keys: advisory-db-

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        # --no-fetch uses the cached advisory-db; on a cache miss (first run of the
        # week or cold runner) --no-fetch fails because there is no local DB yet,
        # so we fall back to a plain `cargo audit`, which fetches the DB itself.
        # cargo-audit has no --db-update flag; a genuine advisory hit still fails
        # this second invocation, so it is never masked by the fallback.
        run: cargo audit --no-fetch || cargo audit

      - name: Open GitHub issue on audit failure
        if: failure()
        uses: actions/github-script@v7
        with:
          # GITHUB_TOKEN is automatically provided — no extra secret needed.
          script: |
            const title = `[security] cargo audit found vulnerabilities – ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Weekly `cargo audit` detected advisories',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Open the run link above for the full advisory list.',
              '',
              'To resolve: bump the affected dependency or add an `[advisories.ignore]` entry in',
              '`audit.toml` with a tracked justification comment.',
            ].join('\n');

            // Avoid duplicate open issues for the same week.
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,cargo-audit',
              per_page: 10,
            });
            const alreadyOpen = issues.some(i => i.title.startsWith('[security] cargo audit'));
            if (alreadyOpen) {
              core.info('An open cargo-audit issue already exists — skipping creation.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'cargo-audit'],
            });
