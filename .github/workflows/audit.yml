name: Security Audit (scheduled)

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Get week stamp for cache key
        id: date
        run: echo "week=$(date -u +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache advisory-db
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ steps.date.outputs.week }}
          restore-keys: advisory-db-

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        # --no-fetch uses the cached advisory-db; on a cache miss (first run of the
        # week or cold runner) we refresh the DB and re-run --no-fetch.
        # Splitting cache-miss recovery from advisory failure prevents a genuine
        # advisory hit from being masked by the retry: if --no-fetch fails due to a
        # missing DB the update step fixes that; if it fails due to an advisory the
        # re-run after --db-update will still report it.
        run: cargo audit --no-fetch || { cargo audit --db-update && cargo audit --no-fetch; }
