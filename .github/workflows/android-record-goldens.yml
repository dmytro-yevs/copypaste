# Manually-triggered job to (re-)record Paparazzi golden screenshots on
# Linux. Baselines committed on macOS never verify on ubuntu runners at
# maxPercentDifference=0.0 (Paparazzi's layoutlib-native ships per-OS Skia,
# so font hinting/AA differ across macOS/Linux for every text surface —
# CopyPaste-u0tk3). This job records on the SAME OS the verify job runs on
# (ubuntu-latest), then opens a PR with the re-recorded PNGs so a human
# reviews the visual diff before it becomes the new baseline. Never runs
# automatically — workflow_dispatch only. Tolerance stays at 0.0; this
# workflow does not touch verifyPaparazziDebug or its triggers.
name: Record Paparazzi goldens (Linux)

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  record-goldens:
    name: Record goldens on Linux and open PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-paparazzi-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-paparazzi-${{ runner.os }}-

      - name: Generate fallback debug keystore (CopyPaste-d41w.4)
        run: |
          KS=android/app/debug.keystore
          if [ ! -f "$KS" ]; then
            keytool -genkeypair -v -keystore "$KS" -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated fallback debug keystore at $KS"
          fi

      - name: Record Paparazzi goldens
        working-directory: android
        # -x buildCargoNdk: pure-Kotlin/UI task, no native .so needed.
        run: ./gradlew :app:recordPaparazziDebug -x buildCargoNdk

      - name: Check for golden changes
        id: diff
        run: |
          if git status --porcelain -- android/app/src/test/snapshots/images/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and open PR with re-recorded goldens
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: |
            Paparazzi golden screenshots re-recorded on **ubuntu-latest** (Linux Skia) by the `Record Paparazzi goldens (Linux)` workflow (run ${{ github.run_number }}).

            Baselines previously recorded on macOS never verify on Linux CI runners at `maxPercentDifference=0.0`, because Paparazzi's layoutlib-native ships a per-OS Skia build and font hinting/anti-aliasing differ across platforms for every text surface (CopyPaste-u0tk3).

            **Please review the visual diffs in this PR carefully before merging.** Once merged, the `android-paparazzi` (Paparazzi golden verify) CI job compares against these Linux-recorded goldens and should go green on ubuntu-latest.

            Tolerance remains `maxPercentDifference=0.0` — this PR only updates baseline images, it does not loosen verification.
        run: |
          set -euo pipefail
          BRANCH="ci/record-goldens-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add android/app/src/test/snapshots/images/
          git commit -m "test(android): re-record Paparazzi goldens on Linux (run ${{ github.run_number }})"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "test(android): re-record Paparazzi goldens on Linux (run ${{ github.run_number }})" \
            --body "$PR_BODY"

      - name: No golden changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "recordPaparazziDebug produced no changes to android/app/src/test/snapshots/images/ — nothing to PR."
