name: CI Android Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'crates/copypaste-android/**'
      - 'crates/copypaste-core/**'
      - '.github/workflows/ci-android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'crates/copypaste-android/**'
      - 'crates/copypaste-core/**'
      - '.github/workflows/ci-android-build.yml'

concurrency:
  group: ci-android-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NDK_VERSION: "27.2.12479018"

jobs:
  build-android-ndk:
    name: Build Android .so (cargo-ndk)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Cache cargo + Android NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-ndk-${{ env.NDK_VERSION }}-

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Build .so libraries via cargo-ndk
        run: |
          cargo ndk \
            -t arm64-v8a \
            -o android/app/src/main/jniLibs \
            build --profile release-size -p copypaste-android

      - name: Verify .so artifacts
        run: |
          echo "=== jniLibs contents ==="
          find android/app/src/main/jniLibs -type f | sort
          test -f android/app/src/main/jniLibs/arm64-v8a/libcopypaste_android.so || \
            { echo "ERROR: arm64-v8a .so missing"; exit 1; }

      # Note: no "Pre-generate debug keystore" step needed — android/app/debug.keystore
      # is committed to the repo and referenced by signingConfigs.debug in build.gradle.kts.
      # Generating a fresh keystore each run was the root cause of INSTALL_FAILED_UPDATE_INCOMPATIBLE.

      - name: Gradle assembleDebug
        working-directory: android
        # REGRESSION GUARD (buildCargoNdk + Gradle configuration cache):
        # gradle.properties sets org.gradle.configuration-cache=true, so this
        # assembleDebug invocation exercises the configuration cache on every run.
        # This guards against a past regression where the :app:buildCargoNdk task
        # was incompatible with the configuration cache (fixed in build.gradle.kts).
        # Do NOT add --no-configuration-cache here; the whole point is to catch
        # future incompatibilities before they reach release.
        run: |
          # .so already built above - skip the Gradle cargo-ndk task to avoid
          # re-running cargo inside CI where ANDROID_NDK_HOME is already set.
          ./gradlew assembleDebug -x buildCargoNdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: copypaste-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # JVM unit tests (Robolectric / plain JUnit4 — no emulator required).
  # These run on every PR and push that touches Android sources, giving
  # fast feedback without the multi-minute emulator boot.
  #
  # connectedAndroidTest (instrumented tests that need a real device / AVD)
  # is NOT run in CI at all — there is no emulator step in any workflow.
  # Running a hardware-accelerated AVD requires GitHub's larger hosted runners
  # (expensive) and adds ~10 min of boot time per run. To run instrumented
  # tests locally: ./gradlew :app:connectedAndroidTest
  # See CopyPaste-7zby: the previous comment incorrectly claimed they ran in
  # the nightly workflow; the nightly-android job only builds Docker artifacts.
  android-unit-test:
    name: Android JVM unit tests
    runs-on: ubuntu-latest
    # Unit tests do not need the native .so; the Kotlin/Java sources compile
    # on the JVM and Robolectric stubs the Android runtime. Run this job in
    # parallel with build-android-ndk to keep CI fast.
    #
    # IMPORTANT — .so gate: because this job uses -x buildCargoNdk, a broken
    # native library will NOT be caught here. The build-android-ndk job above
    # is the definitive gate for native .so correctness and MUST NOT be removed
    # or made optional. Both jobs are required to pass before merging.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run JVM unit tests
        working-directory: android
        # -x buildCargoNdk: skip the Rust .so build step — the JVM unit tests
        # do not load native libraries (they are stubbed by Robolectric or
        # are pure Kotlin/Java). This keeps the job fast and avoids requiring
        # a Rust toolchain + NDK here.
        run: ./gradlew :app:test -x buildCargoNdk

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-results
          path: android/app/build/reports/tests/
          retention-days: 7
          if-no-files-found: warn

  # Android lint — Kotlin/XML static analysis (CopyPaste-ko9y).
  # Previously only ran in release.yml (tag-triggered); added here so lint
  # failures are caught on every PR/push, not just at release time.
  # Does not require the native .so — lint analyses Kotlin/XML sources only.
  # Mirrors the android-validate job in release.yml but runs in the PR workflow.
  android-lint:
    name: Android lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-lint-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: gradle-lint-${{ runner.os }}-

      - name: Android lint
        working-directory: android
        # -x buildCargoNdk: skip the Rust .so build — lint analyses
        # Kotlin/XML sources only and does not load native libraries.
        # Lint catches resource mismatches, missing string keys, broken
        # layouts, ProGuard issues, and API-level compatibility problems.
        run: ./gradlew :app:lint -x buildCargoNdk

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results*.html
          retention-days: 7
          if-no-files-found: warn
