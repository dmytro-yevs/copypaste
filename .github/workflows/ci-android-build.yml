name: CI Android Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'crates/copypaste-android/**'
      - 'crates/copypaste-core/**'
      - '.github/workflows/ci-android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'crates/copypaste-android/**'
      - 'crates/copypaste-core/**'
      - '.github/workflows/ci-android-build.yml'

concurrency:
  group: ci-android-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NDK_VERSION: "27.2.12479018"

jobs:
  build-android-ndk:
    name: Build Android .so (cargo-ndk)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Cache cargo + Android NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-ndk-${{ env.NDK_VERSION }}-

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Build .so libraries via cargo-ndk
        run: |
          cargo ndk \
            -t arm64-v8a \
            -o android/app/src/main/jniLibs \
            build --profile release-size -p copypaste-android

      - name: Verify .so artifacts
        run: |
          echo "=== jniLibs contents ==="
          find android/app/src/main/jniLibs -type f | sort
          test -f android/app/src/main/jniLibs/arm64-v8a/libcopypaste_android.so || \
            { echo "ERROR: arm64-v8a .so missing"; exit 1; }

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: copypaste-android-so
          path: android/app/src/main/jniLibs/
          retention-days: 1

      - name: Generate fallback debug keystore (CopyPaste-d41w.4)
        # build.gradle.kts generates debug.keystore via project.exec at config
        # time, which the Gradle configuration cache forbids -> the keystore is
        # never created -> assembleDebug fails with a config-cache serialization
        # error. Pre-create it here so the config-time exec is skipped by its
        # exists() guard. Mirrors the equivalent step in release.yml (line 578).
        # android/app/debug.keystore is gitignored — never commit the file.
        run: |
          KS=android/app/debug.keystore
          if [ ! -f "$KS" ]; then
            keytool -genkeypair -v -keystore "$KS" -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated fallback debug keystore at $KS"
          fi

      - name: Gradle assembleDebug
        working-directory: android
        # REGRESSION GUARD (buildCargoNdk + Gradle configuration cache):
        # gradle.properties sets org.gradle.configuration-cache=true, so this
        # assembleDebug invocation exercises the configuration cache on every run.
        # This guards against a past regression where the :app:buildCargoNdk task
        # was incompatible with the configuration cache (fixed in build.gradle.kts).
        # Do NOT add --no-configuration-cache here; the whole point is to catch
        # future incompatibilities before they reach release.
        run: |
          # .so already built above - skip the Gradle cargo-ndk task to avoid
          # re-running cargo inside CI where ANDROID_NDK_HOME is already set.
          ./gradlew assembleDebug -x buildCargoNdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: copypaste-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # JVM unit tests (Robolectric / plain JUnit4 — no emulator required).
  # These run on every PR and push that touches Android sources, giving
  # fast feedback without the multi-minute emulator boot.
  #
  # CopyPaste-ojas.9: this job must declare needs: build-android-ndk so that
  # a Rust compile failure in the native .so blocks unit tests from reporting
  # green on a broken commit. Without the dependency, both jobs could run in
  # parallel and a merge could happen while build-android-ndk was still failing.
  #
  # connectedAndroidTest (instrumented tests that need a real device / AVD)
  # runs in the android-instrumented job below (CopyPaste-ojas.5).
  android-unit-test:
    name: Android JVM unit tests
    runs-on: ubuntu-latest
    needs: build-android-ndk
    # needs: build-android-ndk ensures the native .so is built and correct
    # before these JVM unit tests run (CopyPaste-ojas.9). Even though
    # Robolectric stubs the Android runtime and no .so is loaded in JVM tests,
    # a Rust compile failure must block this job to prevent false-green CI.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate fallback debug keystore (CopyPaste-d41w.4)
        run: |
          KS=android/app/debug.keystore
          if [ ! -f "$KS" ]; then
            keytool -genkeypair -v -keystore "$KS" -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated fallback debug keystore at $KS"
          fi

      - name: Run JVM unit tests
        working-directory: android
        # -x buildCargoNdk: skip the Rust .so build step — the JVM unit tests
        # do not load native libraries (they are stubbed by Robolectric or
        # are pure Kotlin/Java). This keeps the job fast and avoids requiring
        # a Rust toolchain + NDK here.
        run: ./gradlew :app:test -x buildCargoNdk

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-results
          path: android/app/build/reports/tests/
          retention-days: 7
          if-no-files-found: warn

  # Android lint — Kotlin/XML static analysis (CopyPaste-ko9y).
  # Previously only ran in release.yml (tag-triggered); added here so lint
  # failures are caught on every PR/push, not just at release time.
  # Does not require the native .so — lint analyses Kotlin/XML sources only.
  # Mirrors the android-validate job in release.yml but runs in the PR workflow.
  android-lint:
    name: Android lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-lint-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: gradle-lint-${{ runner.os }}-

      - name: Generate fallback debug keystore (CopyPaste-d41w.4)
        run: |
          KS=android/app/debug.keystore
          if [ ! -f "$KS" ]; then
            keytool -genkeypair -v -keystore "$KS" -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated fallback debug keystore at $KS"
          fi

      - name: Android lint
        working-directory: android
        # -x buildCargoNdk: skip the Rust .so build — lint analyses
        # Kotlin/XML sources only and does not load native libraries.
        # Lint catches resource mismatches, missing string keys, broken
        # layouts, ProGuard issues, and API-level compatibility problems.
        run: ./gradlew :app:lint -x buildCargoNdk

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results*.html
          retention-days: 7
          if-no-files-found: warn

  # Instrumented tests — run on an AVD emulator (CopyPaste-ojas.5).
  # CryptoConformanceTest and LiveP2pSyncTest require a connected device/emulator
  # because they exercise real cross-language crypto conformance and live P2P sync.
  # Uses reactivecircus/android-emulator-runner which boots a managed AVD and
  # automatically tears it down after the test run.
  #
  # This job runs on every PR/push touching android/ or crates/copypaste-android/
  # (same paths filter as the workflow), gated on build-android-ndk succeeding so
  # the native .so is present in jniLibs before connectedDebugAndroidTest runs.
  android-instrumented:
    name: Android instrumented tests (AVD)
    runs-on: macos-latest
    needs: build-android-ndk
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download .so artifact
        uses: actions/download-artifact@v4
        with:
          name: copypaste-android-so
          path: android/app/src/main/jniLibs/

      - name: Generate fallback debug keystore (CopyPaste-d41w.4)
        run: |
          KS=android/app/debug.keystore
          if [ ! -f "$KS" ]; then
            keytool -genkeypair -v -keystore "$KS" -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated fallback debug keystore at $KS"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-instrumented-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-instrumented-${{ runner.os }}-

      - name: Run instrumented tests on AVD
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: cd android && ./gradlew :app:connectedDebugAndroidTest -x buildCargoNdk

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-test-results
          path: android/app/build/reports/androidTests/
          retention-days: 7
          if-no-files-found: warn
