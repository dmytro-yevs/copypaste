name: Design Token Parity Check

# Checks that token NAMES in tokens.css map 1:1 to CpColors fields and AccentColor
# variants in Color.kt (STYLEGUIDE §11, Phase 7 two-axis redesign).
# The old skin-parity job (skins.ts ↔ Skin.kt) was removed; both files are deleted.
on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  token-parity:
    name: Two-axis token-name parity (tokens.css ↔ CpColors/AccentColor)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run token-parity check
        run: node scripts/parity-check.mjs --verbose
        # Exit code 0 = every CpColors field maps to a CSS custom property and every
        #               AccentColor variant maps to a data-accent= value (PASS).
        # Exit code 1 = one or more names are missing on one side (FAIL — update
        #               tokens.css or Color.kt so both sides agree).
        # See STYLEGUIDE §11 for the mapping rule: camelCase Kotlin field → kebab-case CSS var.
