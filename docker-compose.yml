# Container-based builds for non-macOS platforms.
# macOS builds remain on host (Apple SDK cannot legally run in Linux container).
#
# Usage:
#   docker compose build android         # build the image once (~5 min first time)
#   docker compose run --rm android      # run the build
#   docker compose run --rm linux
#
# Or via wrapper: bash scripts/build-in-docker.sh [android|linux|all]
#
# Windows is FROZEN as of 2026-05-23 (see ADR-012). The `windows` service is
# preserved under the `frozen-windows` profile as reference material; it is
# not picked up by `--profile build` and the underlying build script is a
# no-op shim. Do not invoke it without first reverting the freeze.
#
# Build outputs land in ./builds/<platform>-<arch>/ via the bind mount on
# /workspace. Cargo registry + per-platform target dirs are kept in named
# volumes so the host's ./target stays untouched and rebuilds are fast.

services:
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    volumes:
      - .:/workspace
      - cargo-registry:/home/dev/.cargo/registry
      - cargo-git:/home/dev/.cargo/git
      - cargo-target:/workspace/target
    working_dir: /workspace
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
    tty: true
    stdin_open: true
    command: bash
    restart: unless-stopped

  relay:
    build:
      context: .
      dockerfile: docker/Dockerfile.relay
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    profiles:
      - relay

  # --- Cross-build images (non-macOS) ---------------------------------------
  android:
    build:
      context: .
      dockerfile: docker/Dockerfile.android
    image: copypaste-builder-android:latest
    volumes:
      - .:/workspace
      - cargo-android-cache:/usr/local/cargo/registry
      - cargo-android-target:/workspace/target-android
      # sccache (Rust) + ccache (C) — persisted across runs so incremental
      # rebuilds reuse compilation units. See docker/Dockerfile.android L5.
      - sccache-android:/sccache
      - ccache-android:/ccache
    environment:
      - CARGO_TARGET_DIR=/workspace/target-android
      - ABI=arm64-v8a
      - IN_DOCKER=1
    command: ["bash", "scripts/build-android-pkg.sh", "arm64-v8a"]
    profiles:
      - build

  # FROZEN 2026-05-23 — Windows is out of scope for v0.3+ (see ADR-012).
  # `scripts/build-windows.sh` is a no-op shim; this service is preserved
  # as reference material so reverting the freeze does not require
  # recreating the compose entry. Moved off the `build` profile so
  # `docker compose --profile build run` no longer picks it up. Bring up
  # explicitly with `--profile frozen-windows` only when thawing.
  windows:
    build:
      context: .
      dockerfile: docker/Dockerfile.windows
    image: copypaste-builder-windows:latest
    volumes:
      - .:/workspace
      - cargo-windows-cache:/usr/local/cargo/registry
      - cargo-windows-target:/workspace/target-windows
    environment:
      - CARGO_TARGET_DIR=/workspace/target-windows
      - IN_DOCKER=1
    command: ["bash", "scripts/build-windows.sh", "x86_64"]
    profiles:
      - frozen-windows

  linux:
    build:
      context: .
      dockerfile: docker/Dockerfile.linux
    image: copypaste-builder-linux:latest
    volumes:
      - .:/workspace
      - cargo-linux-cache:/usr/local/cargo/registry
      - cargo-linux-target:/workspace/target-linux
    environment:
      - CARGO_TARGET_DIR=/workspace/target-linux
      - IN_DOCKER=1
    command: ["cargo", "build", "--release", "--target", "x86_64-unknown-linux-musl", "-p", "copypaste-daemon"]
    profiles:
      - build

volumes:
  cargo-registry:
  cargo-git:
  cargo-target:
  cargo-android-cache:
  cargo-android-target:
  cargo-windows-cache:
  cargo-windows-target:
  cargo-linux-cache:
  cargo-linux-target:
  # sccache + ccache backends for the android service. Survive `docker
  # compose down` so the next cold container start hits warm caches.
  sccache-android:
  ccache-android:
