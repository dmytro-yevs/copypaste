services:
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    volumes:
      - .:/workspace
      - cargo-registry:/home/dev/.cargo/registry
      - cargo-git:/home/dev/.cargo/git
      - cargo-target:/workspace/target
    working_dir: /workspace
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
    tty: true
    stdin_open: true
    command: bash

  relay:
    build:
      context: .
      dockerfile: docker/Dockerfile.relay
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    profiles:
      - relay

volumes:
  cargo-registry:
  cargo-git:
  cargo-target:
