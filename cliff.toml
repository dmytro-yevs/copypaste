# git-cliff configuration for CopyPaste
# Generates CHANGELOG.md from Conventional Commits.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
# Header rendered once at the top of the changelog.
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""

# Per-release template (Tera).
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
    {% if commit.breaking %} [**BREAKING**]{% endif %}\
    {% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}\
{% endfor %}\n
"""

footer = """
<!-- generated by git-cliff -->
"""

trim = true

[git]
# Parse commits as Conventional Commits.
conventional_commits = true
filter_unconventional = true
split_commits = false

# Map commit types to changelog sections.
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Tests" },
    { message = "^chore", group = "Chores" },
    { message = "^ci", group = "CI" },
    { message = "^build", group = "Build" },
    # Drop anything else (release commits, merges, etc.)
    { message = ".*", skip = true },
]

# Exclude squash-merge / merge-commit noise.
commit_preprocessors = [
    { pattern = '\(#([0-9]+)\)', replace = "(#${1})" },
]

# Filter out merge commits and release tags from body.
filter_commits = true

# Only consider tags matching v* (vX.Y.Z, vX.Y.Z-beta, etc.).
tag_pattern = "v[0-9].*"

# Skip pre-release tags in stable changelogs? Keep them — we ship betas.
skip_tags = ""

# Skip merge commits — they pollute the changelog.
ignore_tags = ""

# Sort commits inside each group oldest-first.
sort_commits = "oldest"

# Protect against squash-merge subjects that omit the conventional prefix.
protect_breaking_commits = false
