[package]
name = "copypaste-cli"
version.workspace = true
license.workspace = true
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "copypaste"
path = "src/main.rs"

[dependencies]
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
home.workspace = true
copypaste-ipc = { path = "../copypaste-ipc" }
# beta-bonus (vacuum): direct encrypted-DB access for `copypaste vacuum`.
# We open the SQLCipher file ourselves (daemon must be stopped first), so we
# need rusqlite and the core Database wrapper. Adds ~1MB to binary but lets
# us avoid an "IPC vacuum" method that would lock the daemon for seconds.
copypaste-core = { path = "../copypaste-core" }
rusqlite.workspace = true
zeroize = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
# beta-bonus (vacuum): fetch the device secret key from the macOS Keychain so
# we can derive the SQLCipher DB key. Mirrors what the daemon does in
# `copypaste-daemon/src/keychain.rs`. Daemon's keychain module is in a binary
# crate (not importable), so the CLI replicates the small fetch routine.
security-framework.workspace = true

[dev-dependencies]
tempfile = "3"
