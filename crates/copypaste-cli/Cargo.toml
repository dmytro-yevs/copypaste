[package]
name = "copypaste-cli"
version.workspace = true
license.workspace = true
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "copypaste"
path = "src/main.rs"

[dependencies]
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
home.workspace = true
copypaste-ipc = { path = "../copypaste-ipc" }
# QR rendering for `copypaste pair-qr` (terminal block art).
qrcode.workspace = true
# ARCH-RESIDUAL: copypaste-core is linked ONLY by `commands/vacuum.rs`.
# `commands/pair_qr.rs` already routes through IPC (`pair_generate_qr`) —
# it never uses core in code (the module-doc mention is a cross-ref comment).
#
# vacuum opens the SQLCipher file directly (daemon must be stopped first) and
# derives the local-enc key via HKDF-SHA256 on the keychain secret — both
# operations require copypaste_core::Database and copypaste_core::DeviceKeypair.
# Adding a `vacuum` IPC method would put a long-blocking exclusive-lock on the
# daemon's request loop. Until the daemon exposes a "vacuum" IPC verb (tracked
# in CopyPaste-FOLLOW_VACUUM, follow-up bd issue), this dep stays.
# See crates/copypaste-cli/src/commands/vacuum.rs for the full rationale.
copypaste-core = { path = "../copypaste-core" }
rusqlite.workspace = true
zeroize = { workspace = true }
# In-process no-echo password prompt; handles SIGINT/terminal restore.
rpassword = "7"

[target.'cfg(target_os = "macos")'.dependencies]
# beta-bonus (vacuum): fetch the device secret key from the macOS Keychain so
# we can derive the SQLCipher DB key. Mirrors what the daemon does in
# `copypaste-daemon/src/keychain.rs`. Daemon's keychain module is in a binary
# crate (not importable), so the CLI replicates the small fetch routine.
security-framework.workspace = true

[dev-dependencies]
# Pin below 3.14 — tempfile ≥3.14 pulls getrandom 0.4 which requires Rust 1.85+
# (our MSRV is 1.89 so this is already satisfied, but the pin keeps the
# lock consistent with copypaste-core and avoids an accidental bump).
tempfile = ">=3.0, <3.14"
