[package]
name = "copypaste-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
x25519-dalek.workspace = true
chacha20poly1305.workspace = true
hkdf.workspace = true
sha2.workspace = true
zeroize.workspace = true
rand.workspace = true
hex.workspace = true
rusqlite.workspace = true
serde.workspace = true
toml.workspace = true
regex.workspace = true
tracing.workspace = true
thiserror.workspace = true
uuid.workspace = true
image.workspace = true

[dev-dependencies]
# Pin below 3.14 — tempfile ≥3.14 pulls getrandom 0.4 which requires Rust 1.85+
tempfile = ">=3.0, <3.14"
criterion.workspace = true

[[bench]]
name = "crypto"
harness = false

[[bench]]
name = "storage"
harness = false
