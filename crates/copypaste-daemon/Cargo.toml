[package]
name = "copypaste-daemon"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "copypaste-daemon"
path = "src/main.rs"

[features]
# Enables Supabase cloud sync (requires SUPABASE_URL + SUPABASE_ANON_KEY env vars at runtime).
cloud-sync = ["reqwest", "base64"]

[dependencies]
copypaste-core = { path = "../copypaste-core" }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
thiserror.workspace = true
anyhow.workspace = true
home.workspace = true
rusqlite.workspace = true
# cloud-sync feature: HTTP client for Supabase REST + Realtime, base64 encoding
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false, optional = true }
base64 = { version = "0.22", optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
objc2.workspace = true
objc2-foundation.workspace = true
objc2-app-kit.workspace = true
security-framework.workspace = true

[dev-dependencies]
tempfile = "3"
