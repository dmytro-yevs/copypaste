<!doctype html>
<!-- PARITY-SPEC §0: light-first — default theme is "light" on first paint.
       App.tsx re-syncs data-theme to the persisted prefs.theme on first render
       so a saved "dark" preference is honoured immediately after mount.
       data-palette="graphite-mist"  — activates the grey palette token layer
       data-density="compact"        — 13px pad / 12px gap / 34px row-h
       data-motion="cinematic"       — --speed:.72, full aurora opacity
       data-contrast="balanced"      — readable but not harsh; matches styleguide default
     The palette, density, motion, and contrast attributes are static at launch;
     a future palette picker will write them dynamically. -->
<html lang="en"
  data-theme="light"
  data-palette="graphite-mist"
  data-density="compact"
  data-motion="cinematic"
  data-contrast="balanced">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CopyPaste</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
