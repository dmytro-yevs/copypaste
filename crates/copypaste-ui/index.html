<!doctype html>
<!-- Static defaults match DEFAULT_PREFS (dark / indigo / translucency on). The
     external pre-paint theme-bootstrap.js (loaded below, before the module
     entry) overwrites these with the user's persisted appearance before first
     content paint; App.tsx keeps them in sync for live changes afterward. -->
<html lang="en" data-theme="dark" data-accent="indigo" data-translucency="on">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CopyPaste</title>
    <!-- Pre-paint appearance bootstrap — EXTERNAL classic script (CSP is
         `script-src 'self'`, which blocks inline). RELATIVE path is safe under
         Tauri's packaged asset protocol. Must precede the module entry. -->
    <script src="./theme-bootstrap.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
