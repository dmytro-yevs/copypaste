# pnpm 9 (used by CI via pnpm/action-setup@v4 version: '9') treats the presence
# of this file as a workspace root and REQUIRES a non-empty `packages:` field,
# failing with "ERROR packages field missing or empty" otherwise. copypaste-ui is
# a single Tauri app (not a monorepo), so the root `.` is the only entry. An empty
# list ([]) is still rejected as "empty", so list the root package explicitly.
packages:
  - .
allowBuilds:
  esbuild: true
onlyBuiltDependencies:
  - esbuild
# Force esbuild >=0.28.1 to remediate GHSA-gv7w-rqvm-qjhr (arbitrary code exec in
# esbuild <0.28.1 dev server). vite 7.x declares ^0.27.0 so without this override
# pnpm resolves 0.27.x; the override pins the floor without breaking vite 7.
overrides:
  esbuild: ">=0.28.1"
