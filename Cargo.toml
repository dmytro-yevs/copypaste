[workspace]
resolver = "2"
members = [
    "crates/copypaste-core",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
authors = ["CopyPaste"]
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Crypto
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
chacha20poly1305 = "0.10"
hkdf = "0.12"
sha2 = "0.10"
zeroize = { version = "1.7", features = ["derive"] }
rand = "0.8"
hex = "0.4"
# Storage
rusqlite = { version = "0.31", features = ["bundled", "backup"] }
# Config
serde = { version = "1", features = ["derive"] }
toml = "0.8"
# Patterns
regex = "1.10"
# Logging
tracing = "0.1"
# Errors
thiserror = "1"
# Misc
# Pin to <1.21 to stay on getrandom 0.3 (Rust 1.75 compatible; 1.21+ needs getrandom 0.4 / Rust 1.85)
uuid = { version = ">=1.0, <1.21", features = ["v4"] }
